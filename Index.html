<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geolocaliza Pro - Ingeniero Fausto Gómez</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* Contenedor de Cámara */
        #video-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Cursor en Cruz */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 60px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 5;
        }
        .line-v { position: absolute; left: 50%; width: 2px; height: 100%; background: rgba(0, 255, 0, 0.7); transform: translateX(-50%); }
        .line-h { position: absolute; top: 50%; width: 100%; height: 2px; background: rgba(0, 255, 0, 0.7); transform: translateY(-50%); }
        .circle { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #00ff00; border-radius: 50%; transform: translate(-50%, -50%); }

        /* UI Overlay */
        #ui-overlay {
            position: absolute; bottom: 0; width: 100%; padding: 20px 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10;
        }

        #btn-capture {
            width: 70px; height: 70px; background: #ff4757; border: 4px solid white;
            border-radius: 50%; cursor: pointer; box-shadow: 0 0 15px rgba(255,71,87,0.5);
        }

        #btn-calculate {
            display: none; padding: 12px 25px; background: #2ed573; color: white;
            border: none; border-radius: 25px; font-weight: bold; cursor: pointer;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #info {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #00ff00; padding: 10px 15px;
            border-radius: 15px; font-size: 13px; width: 85%; text-align: center; border: 1px solid #00ff00;
        }

        /* Contenedor de Mapa y Resultados */
        #result-container { display: none; width: 100%; height: 100%; background: white; flex-direction: column; }
        #google-map { flex-grow: 1; width: 100%; border: none; }
        
        #result-card {
            padding: 15px; background: #1e1e1e; color: white; display: flex;
            flex-direction: column; gap: 10px; border-top: 3px solid #2ed573;
        }

        .btn-action {
            padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none;
        }
        .btn-nav { background: #1e90ff; color: white; }
        .btn-reset { background: #57606f; color: white; }
    </style>
</head>
<body>

    <div id="video-container">
        <div id="info">Calibrando sensores e iniciando GPS...</div>
        <video id="webcam" autoplay playsinline></video>
        <div id="crosshair"><div class="line-v"></div><div class="line-h"></div><div class="circle"></div></div>

        <div id="ui-overlay">
            <button id="btn-calculate">CALCULAR PUNTO</button>
            <button id="btn-capture" title="Capturar Medición"></button>
            <p style="color: #ccc; font-size: 12px; margin: 0;">Apunta al objetivo y captura (mínimo 3)</p>
        </div>
    </div>

    <div id="result-container">
        <iframe id="google-map"></iframe>
        <div id="result-card">
            <div id="coords-display" style="font-family: monospace; font-size: 14px;">Calculando...</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <a id="btn-navigate" target="_blank" class="btn-action btn-nav">CÓMO LLEGAR</a>
                <button class="btn-action btn-reset" onclick="location.reload()">NUEVA TOMA</button>
            </div>
        </div>
    </div>

    <script>
        let measurements = [];
        let currentAzimuth = 0;
        let currentLocation = null;
        let finalLat = 0, finalLon = 0;

        const video = document.getElementById('webcam');
        const info = document.getElementById('info');
        const btnCapture = document.getElementById('btn-capture');
        const btnCalculate = document.getElementById('btn-calculate');

        // 1. Cámara
        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) { info.innerText = "Error: Acceso a cámara denegado."; }
        }

        // 2. GPS de alta precisión
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                currentLocation = { lat: pos.coords.latitude, lon: pos.coords.longitude, alt: pos.coords.altitude || 0 };
                updateStatus();
            }, null, { enableHighAccuracy: true });
        }

        // 3. Brújula
        window.addEventListener('deviceorientationabsolute', (e) => {
            if (e.alpha !== null) { currentAzimuth = (360 - e.alpha) % 360; updateStatus(); }
        }, true);

        function updateStatus() {
            info.innerHTML = `PUNTOS: <b>${measurements.length}</b> | AZ: <b>${Math.round(currentAzimuth)}°</b><br>LAT: ${currentLocation?.lat.toFixed(6)} | LON: ${currentLocation?.lon.toFixed(6)}`;
            if (measurements.length >= 3) btnCalculate.style.display = 'block';
        }

        // 4. Captura de datos
        btnCapture.onclick = () => {
            if (!currentLocation) return alert("Esperando señal GPS...");
            
            measurements.push({
                x: currentLocation.lon * 111320 * Math.cos(currentLocation.lat * Math.PI / 180),
                y: currentLocation.lat * 110574,
                angle: currentAzimuth * Math.PI / 180
            });
            updateStatus();
        };

        // 5. Cálculo y Transición al Mapa
        btnCalculate.onclick = () => {
            let sumA = [[0,0], [0,0]];
            let sumB = [0,0];

            measurements.forEach(m => {
                let vx = Math.sin(m.angle), vy = Math.cos(m.angle);
                let m00 = 1 - vx*vx, m01 = -vx*vy, m11 = 1 - vy*vy;
                sumA[0][0] += m00; sumA[0][1] += m01; sumA[1][0] += m01; sumA[1][1] += m11;
                sumB[0] += m00 * m.x + m01 * m.y; sumB[1] += m01 * m.x + m11 * m.y;
            });

            let det = sumA[0][0] * sumA[1][1] - sumA[0][1] * sumA[1][0];
            if (Math.abs(det) < 0.0001) return alert("Error matemático: Líneas paralelas.");

            let resX = (sumB[0] * sumA[1][1] - sumB[1] * sumA[0][1]) / det;
            let resY = (sumA[0][0] * sumB[1] - sumA[1][0] * sumB[0]) / det;

            finalLat = resY / 110574;
            finalLon = resX / (111320 * Math.cos(finalLat * Math.PI / 180));

            showResults();
        };

        function showResults() {
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'flex';
            
            document.getElementById('coords-display').innerHTML = `<b>PUNTO ESTIMADO:</b><br>LAT: ${finalLat.toFixed(7)}<br>LON: ${finalLon.toFixed(7)}`;
            
            // Link de Navegación Google Maps
            document.getElementById('btn-navigate').href = `https://www.google.com/maps/dir/?api=1&destination=${finalLat},${finalLon}`;
            
            const apiKey = 'AIzaSyAzNvxKWSnl12ig-ppS4eVFUMnnXUC1fsI';
            document.getElementById('google-map').src = `https://www.google.com/maps/embed/v1/place?key=${apiKey}&q=${finalLat},${finalLon}&zoom=18&maptype=satellite`;
        }

        setupCamera();
    </script>
</body>
</html>
